<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Go Tracker | Rastreamento Veicular via Satélite</title>

    <meta
      name="description"
      content="A Go Tracker oferece rastreamento veicular, gestão de frotas, telemetria avançada e otimização de rotas para empresas que buscam mais segurança, controle e eficiência operacional."
    />
    <meta
      name="keywords"
      content="rastreamento veicular, gestão de frotas, telemetria, monitoramento de veículos, otimização de rotas, controle de frota, rastreador veicular, Go Tracker"
    />
    <meta name="author" content="Go Tracker" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1e3a8a" />

    <link rel="canonical" href="https://www.gotracker.com.br/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Go Tracker | Rastreamento Veicular e Gestão de Frotas"
    />
    <meta
      property="og:description"
      content="Tecnologia inteligente para rastreamento veicular, telemetria e gestão de frotas com mais segurança e controle em tempo real."
    />
    <meta property="og:url" content="https://www.gotracker.com.br/" />
    <meta
      property="og:image"
      content="https://www.gotracker.com.br/assets/img/logo.png"
    />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Go Tracker" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Go Tracker | Rastreamento Veicular e Gestão de Frotas"
    />
    <meta
      name="twitter:description"
      content="Soluções em rastreamento veicular, telemetria e gestão inteligente de frotas para sua empresa."
    />
    <meta
      name="twitter:image"
      content="https://www.gotracker.com.br/assets/img/logo.png"
    />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- SEO Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Go Tracker",
        "url": "https://www.gotracker.com.br/",
        "logo": "https://www.gotracker.com.br/assets/img/logo.png",
        "description": "Empresa especializada em rastreamento veicular, gestão de frotas, telemetria e otimização de rotas.",
        "sameAs": ["https://www.facebook.com/", "https://www.instagram.com/"]
      }
    </script>

    <script>
      const theme = localStorage.getItem("theme");

      if (
        theme === "dark" ||
        (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
